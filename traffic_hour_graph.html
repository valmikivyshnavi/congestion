<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic AI v2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:20px;
    background:#f4f4f4;
}

h2{
    color:#1565c0;
}

#prediction{
    font-size:24px;
    font-weight:bold;
    margin:20px 0;
}

#alertBox{
    font-size:18px;
    font-weight:bold;
    margin-bottom:20px;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
}

a{
    text-decoration:none;
    color:#1565c0;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>🚦 Smart Traffic AI Dashboard v2</h2>

<a href="dashboard.html">⬅ Back to Dashboard</a>

<br><br>

<div id="prediction"></div>

<div id="alertBox"></div>

<canvas id="chart"></canvas>

<script>

let data=[
10,15,20,30,40,60,80,90,
85,70,60,55,50,60,
70,80,90,95,85,70,
60,50,40,30
];

const chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:Array.from({length:24},(_,i)=>i+":00"),

datasets:[{

label:"Live Traffic Level",

data:data,

borderColor:"blue",

backgroundColor:"rgba(54,162,235,0.2)",

fill:true,

tension:0.3

}]
},

options:{
responsive:true
}

});

function getTimeScore(hour){

if((hour>=7&&hour<=10)||(hour>=17&&hour<=21))
return 85;

if(hour>=11&&hour<=16)
return 50;

return 25;

}

function getDataScore(values){

return values.reduce((a,b)=>a+b,0)/values.length;

}

function predict(hour,values){

let score=(getTimeScore(hour)*0.6)+(getDataScore(values)*0.4);

if(score>75)
return "HIGH 🔴";

if(score>45)
return "MEDIUM 🟡";

return "LOW 🟢";

}

function showAlert(status){

const box=document.getElementById("alertBox");

if(status.includes("HIGH")){

box.innerHTML="⚠ Heavy Traffic Detected - Avoid Route";
box.style.color="red";

}
else if(status.includes("MEDIUM")){

box.innerHTML="⚠ Moderate Traffic - Drive Carefully";
box.style.color="orange";

}
else{

box.innerHTML="✅ Smooth Traffic Flow";
box.style.color="green";

}

}

function updateSystem(){

data=data.map(v=>{

let change=Math.random()*10-5;

return Math.max(0,Math.min(100,v+change));

});

chart.data.datasets[0].data=data;

chart.update();

let hour=new Date().getHours();

let result=predict(hour,data);

document.getElementById("prediction").innerHTML="Live Prediction : "+result;

showAlert(result);

}

updateSystem();

setInterval(updateSystem,5000);

</script>

</body>
</html>
