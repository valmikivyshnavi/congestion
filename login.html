<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:850px;
    height:500px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.left{
    width:50%;
    background:#0077ff;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:30px;
}

.left h1{
    margin:15px 0;
}

.left p{
    text-align:center;
    margin-bottom:25px;
}

.left button{
    padding:12px 30px;
    background:white;
    color:#0077ff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

form{
    width:80%;
    position:absolute;
    transition:.5s;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0077ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0056cc;
}

.switch{
    margin-top:15px;
    color:#0077ff;
    cursor:pointer;
    text-align:center;
}

.icon{
    font-size:70px;
}

#loginForm{
    opacity:1;
    transform:translateX(0);
}

#registerForm{
    opacity:0;
    transform:translateX(100%);
}

.container.active #loginForm{
    opacity:0;
    transform:translateX(-100%);
}

.container.active #registerForm{
    opacity:1;
    transform:translateX(0);
}
</style>

</head>
<body>

<div class="container" id="container">

<div class="left">
<div class="icon">🚦</div>
<h1>SMART TRAFFIC</h1>
<p>AI Traffic Monitoring System</p>

<button onclick="toggle()">Switch Form</button>

</div>

<div class="right">

<form id="loginForm">

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Username" required>

<input type="password" id="loginPass" placeholder="Password" required>

<button type="submit">Login</button>

<div class="switch" onclick="toggle()">
New User? Register
</div>

</form>


<form id="registerForm">

<h2>Register</h2>

<input type="text" id="regUser" placeholder="Username" required>

<input type="email" id="regEmail" placeholder="Email" required>

<input type="password" id="regPass" placeholder="Password" required>

<button type="submit">Register</button>

<div class="switch" onclick="toggle()">
Already Registered? Login
</div>

</form>

</div>

</div>

<script>

function toggle(){
    document.getElementById("container").classList.toggle("active");
}

// REGISTER
document.getElementById("registerForm").addEventListener("submit",function(e){

    e.preventDefault();

    let username=document.getElementById("regUser").value;
    let email=document.getElementById("regEmail").value;
    let password=document.getElementById("regPass").value;

    localStorage.setItem("username",username);
    localStorage.setItem("email",email);
    localStorage.setItem("password",password);

    alert("Registration Successful!");

    document.getElementById("registerForm").reset();

    document.getElementById("container").classList.remove("active");

});


// LOGIN
document.getElementById("loginForm").addEventListener("submit",function(e){

    e.preventDefault();

    let username=document.getElementById("loginUser").value;
    let password=document.getElementById("loginPass").value;

    let savedUser=localStorage.getItem("username");
    let savedPass=localStorage.getItem("password");

    if(username===savedUser && password===savedPass){

        alert("Login Successful");

        window.location.href="dashboard.html";

    }else{

        alert("Invalid Username or Password");

    }

});

</script>

</body>
</html>
